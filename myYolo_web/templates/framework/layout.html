<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}myYolo Web{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="{{ url_for('static', filename='lib/bootstrap-5.3.3-dist/css/bootstrap.min.css') }}" rel="stylesheet">
    {% block css %}{% endblock %}
</head>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    .navbar {
        background-color: #333;
        overflow: hidden;
    }

    .navbar a {
        float: left;
        display: block;
        color: white;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
    }

    .navbar a:hover {
        background-color: #ddd;
        color: black;
    }

    .content {
        padding: 20px;
    }
</style>
</head>

<body>

    <div class="navbar">
        <a href="{{ url_for('root.home') }}">Home</a>
        <a href="{{ url_for('filter.filter_data') }}">Filter</a>
        <a href="{{ url_for('label.label') }}">Label</a>
        <a href="{{ url_for('add_data.add_data') }}">Add Data</a>
        <a href="{{ url_for('train.train') }}">Train</a>
        <a href="{{ url_for('test.test') }}">Test</a>
        <a href="{{ url_for('export.export') }}">Export</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='lib/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/jquery-3.7.1.min.js') }}"></script>

    {% block script %} {% endblock %}

</body>

</html>
