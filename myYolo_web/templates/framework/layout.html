<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}myYolo Web{% endblock %}</title>
    <link href="{{ url_for('static', filename='lib/bootstrap-5.3.3-dist/css/bootstrap.min.css') }}" rel="stylesheet">
</head>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('filter_data') }}">Filter</a>
        <a href="{{ url_for('label') }}">Label</a>
        <a href="{{ url_for('add_data') }}">Add Data</a>
        <a href="{{ url_for('train') }}">Train</a>
        <a href="{{ url_for('test') }}">Test</a>
        <a href="{{ url_for('export') }}">Export</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

<script src="{{ url_for('static', filename='lib/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
